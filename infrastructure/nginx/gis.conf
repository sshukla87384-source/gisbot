# Get It Sasta — Nginx edge (single Hostinger KVM 8 VPS).
# deploy.sh renders __DOMAIN__ from NGINX_DOMAIN and writes gis.rendered.conf,
# which compose mounts. Hosts:
#   __DOMAIN__ / www.__DOMAIN__  → luxury landing page (static)
#   api.__DOMAIN__               → API (:8080) + payment/telegram webhooks
#   admin.__DOMAIN__             → admin panel (:3000)

limit_req_zone $binary_remote_addr zone=login:10m rate=5r/m;
limit_req_zone $binary_remote_addr zone=api:10m rate=60r/s;

map $http_upgrade $connection_upgrade { default upgrade; "" close; }

# ── HTTP :80 — ACME for every host, landing over http, app hosts → https ──
server {
    listen 80 default_server;
    server_name _;

    location /.well-known/acme-challenge/ { root /var/www/certbot; }

    location / {
        if ($host ~* ^(api|admin)\.) { return 301 https://$host$request_uri; }
        root /usr/share/nginx/landing;
        try_files /index.html =404;
    }
}

# ── api.__DOMAIN__ ───────────────────────────────────────────────────────────
server {
    listen 443 ssl;
    http2 on;
    server_name api.__DOMAIN__;

    ssl_certificate     /etc/letsencrypt/live/api.__DOMAIN__/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.__DOMAIN__/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;

    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    resolver 127.0.0.11 valid=30s;
    client_max_body_size 20m;

    location /webhooks/telegram/ {
        set $bot_upstream http://bot:8081;
        proxy_pass $bot_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 30s;
    }
    location /webhooks/payments/ {
        set $worker_upstream http://worker:8082;
        proxy_pass $worker_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 30s;
    }
    location /api/v1/auth/login {
        limit_req zone=login burst=5 nodelay;
        set $api_upstream http://api:8080;
        proxy_pass $api_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
    location /api/ {
        limit_req zone=api burst=120 nodelay;
        set $api_upstream http://api:8080;
        proxy_pass $api_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-Proto https;
        proxy_read_timeout 60s;
    }
    location = /health {
        set $bot_health http://bot:8081/health;
        proxy_pass $bot_health;
        access_log off;
    }
    location / { return 404; }
}

# ── admin.__DOMAIN__ ─────────────────────────────────────────────────────────
server {
    listen 443 ssl;
    http2 on;
    server_name admin.__DOMAIN__;

    ssl_certificate     /etc/letsencrypt/live/api.__DOMAIN__/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.__DOMAIN__/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;

    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    resolver 127.0.0.11 valid=30s;

    location / {
        set $admin_upstream http://admin:3000;
        proxy_pass $admin_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-Proto https;
    }
}

# >>> LANDING_HTTPS (deploy.sh removes this block until the root cert exists)
server {
    listen 443 ssl;
    http2 on;
    server_name __DOMAIN__ www.__DOMAIN__;

    ssl_certificate     /etc/letsencrypt/live/__DOMAIN__/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/__DOMAIN__/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;

    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    root /usr/share/nginx/landing;
    location / { try_files $uri $uri/ /index.html; }
}
# <<< LANDING_HTTPS
