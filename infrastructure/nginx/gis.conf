# Get It Sasta — Nginx edge (single Hostinger KVM 8 VPS).
# Replace __DOMAIN__ before first start (deploy.sh does this via NGINX_DOMAIN in .env):
#   api.__DOMAIN__   → API (:8080), payment webhooks, Telegram webhook (:8081)
#   admin.__DOMAIN__ → admin panel (:3000)
#
# Upstreams use runtime DNS (resolver + variables) so nginx starts even while
# the api/admin services are not yet deployed (compose profile "full").

limit_req_zone $binary_remote_addr zone=login:10m rate=5r/m;
limit_req_zone $binary_remote_addr zone=api:10m rate=60r/s;

map $http_upgrade $connection_upgrade {
    default upgrade;
    ""      close;
}

# ── HTTP: ACME + redirect ────────────────────────────────────────────────────
server {
    listen 80;
    server_name api.__DOMAIN__ admin.__DOMAIN__;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }
    location / {
        return 301 https://$host$request_uri;
    }
}

# ── api.__DOMAIN__ ───────────────────────────────────────────────────────────
server {
    listen 443 ssl;
    http2 on;
    server_name api.__DOMAIN__;

    ssl_certificate     /etc/letsencrypt/live/api.__DOMAIN__/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.__DOMAIN__/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_stapling on;
    ssl_stapling_verify on;

    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    resolver 127.0.0.11 valid=30s;
    client_max_body_size 20m;

    # Telegram bot webhook → bot service (secret path + Telegram secret token
    # verified by the app itself).
    location /webhooks/telegram/ {
        set $bot_upstream http://bot:8081;
        proxy_pass $bot_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 30s;
    }

    # Payment gateway webhooks → API (signature-gated; no rate limit).
    location /webhooks/payments/ {
        set $api_upstream http://api:8080;
        proxy_pass $api_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 30s;
    }

    # Auth endpoints — strict per-IP limit.
    location /api/v1/auth/login {
        limit_req zone=login burst=5 nodelay;
        set $api_upstream http://api:8080;
        proxy_pass $api_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # REST API.
    location /api/ {
        limit_req zone=api burst=120 nodelay;
        set $api_upstream http://api:8080;
        proxy_pass $api_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-Proto https;
        proxy_read_timeout 60s;
    }

    location /health {
        set $bot_upstream http://bot:8081;
        proxy_pass $bot_upstream;
        access_log off;
    }

    location / {
        return 404;
    }
}

# ── admin.__DOMAIN__ ─────────────────────────────────────────────────────────
server {
    listen 443 ssl;
    http2 on;
    server_name admin.__DOMAIN__;

    ssl_certificate     /etc/letsencrypt/live/api.__DOMAIN__/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.__DOMAIN__/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;

    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    resolver 127.0.0.11 valid=30s;

    location / {
        set $admin_upstream http://admin:3000;
        proxy_pass $admin_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-Proto https;
    }
}
